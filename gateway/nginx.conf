events { worker_connections 1024; }

http {
    upstream facultades { server ms-facultades:8080; }
    #upstream investigadores { server ms-investigadores:8080; }
    #upstream investigaciones { server ms-investigaciones:8080; }

    server {
        listen 80;

        location /facultades {
            proxy_pass http://facultades;
            proxy_set_header Host $host;
            }

        location /carreras {
            proxy_pass http://facultades;
            proxy_set_header Host $host;
            }

        location /investigadores {
            proxy_pass http://investigadores;
        }

        #location /api/investigaciones {
        #    proxy_pass http://investigaciones;
        #}
    }
}